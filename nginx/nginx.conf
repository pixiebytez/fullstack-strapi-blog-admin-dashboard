##############################################################
#  Nginx — AI Blog CMS Production Config
#  Handles: SSL termination, proxy, caching, rate limiting
##############################################################

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 1024;
  multi_accept       on;
  use                epoll;
}

http {
  charset              utf-8;
  sendfile             on;
  tcp_nopush           on;
  tcp_nodelay          on;
  server_tokens        off;
  log_not_found        off;
  types_hash_max_size  2048;
  client_max_body_size 100M;

  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ----------------------------------------------------------
  # Logging
  # ----------------------------------------------------------
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  '$request_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ----------------------------------------------------------
  # Gzip compression
  # ----------------------------------------------------------
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_min_length   256;
  gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # ----------------------------------------------------------
  # Rate limiting zones
  # ----------------------------------------------------------
  limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

  # ----------------------------------------------------------
  # Proxy cache
  # ----------------------------------------------------------
  proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=STATIC:10m
    inactive=7d
    use_temp_path=off;

  # ----------------------------------------------------------
  # Upstream: Strapi CMS
  # ----------------------------------------------------------
  upstream strapi {
    server strapi:1337;
    keepalive 32;
  }

  # ----------------------------------------------------------
  # Upstream: Next.js Frontend
  # ----------------------------------------------------------
  upstream nextjs {
    server nextjs:3000;
    keepalive 32;
  }

  # ----------------------------------------------------------
  # Redirect HTTP → HTTPS
  # ----------------------------------------------------------
  server {
    listen      80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ----------------------------------------------------------
  # API — Strapi Backend (api.yourdomain.com)
  # ----------------------------------------------------------
  server {
    listen      443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/nginx/ssl/api.crt;
    ssl_certificate_key /etc/nginx/ssl/api.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy   "default-src 'self' https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Auth rate limiting
    location ~ ^/api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://strapi;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://strapi;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static uploads — cached aggressively
    location /uploads/ {
      proxy_pass         http://strapi;
      proxy_cache        STATIC;
      proxy_cache_valid  200 7d;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Admin panel
    location /admin {
      limit_req zone=general burst=10 nodelay;
      proxy_pass         http://strapi;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }
  }

  # ----------------------------------------------------------
  # Frontend — Next.js (yourdomain.com)
  # ----------------------------------------------------------
  server {
    listen      443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/nginx/ssl/frontend.crt;
    ssl_certificate_key /etc/nginx/ssl/frontend.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js static assets — long cache
    location /_next/static/ {
      proxy_pass  http://nextjs;
      proxy_cache STATIC;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      limit_req zone=general burst=60 nodelay;
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
